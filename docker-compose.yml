name: notiflux
services:
  # ===== BASE DE DONNèES PostgreSQL =====
  postgres:
    image: postgres:16-alpine
    container_name: notiflux-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
  # ===== BACKEND Spring Boot =====
  backend:
    build:
      context: ./notiflux-backend
      dockerfile: Dockerfile
    container_name: notiflux-backend
    restart: unless-stopped
    env_file:
      - ./notiflux-backend/.env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:${DB_PORT}/${DB_NAME}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
  # ===== FRONTEND Angular (Nginx) =====
  frontend:
    build:
      context: ./notiflux-frontend
      dockerfile: Dockerfile
    container_name: notiflux-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
volumes:
  postgres_data:
    name: notiflux-postgres-data
